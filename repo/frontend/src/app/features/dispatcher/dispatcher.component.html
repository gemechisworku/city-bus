<div class="page">
  <header class="page__nav">
    <span class="page__title">Dispatcher</span>
    <nav>
      @if (auth.hasAnyRole(['ADMIN', 'PASSENGER'])) {
        <a routerLink="/passenger">Passenger</a>
      }
      @if (auth.hasAnyRole(['ADMIN'])) {
        <a routerLink="/admin">Admin</a>
      }
      <button type="button" (click)="logout()">Log out</button>
    </nav>
  </header>
  <p>Dispatcher workspace (task inbox and workflows arrive in later phases).</p>
</div>
